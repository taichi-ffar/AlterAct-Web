<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#080d18">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AlterAct</title>
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <main id="unity-container">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <section id="loading" aria-live="polite">
        <strong>ALTERACT</strong>
        <div id="progress-track"><div id="progress-fill"></div></div>
        <span>因果律へ接続中…</span>
      </section>
      <div id="unity-warning"></div>
      <button id="fullscreen-button" type="button" aria-label="全画面表示">⛶</button>
    </main>
    <script src="Build/2b616946fcce2589f3a7d5e2937a09e9.loader.js"></script>
    <script>
      const canvas = document.querySelector("#unity-canvas");
      const loading = document.querySelector("#loading");
      const progress = document.querySelector("#progress-fill");
      const fullscreenButton = document.querySelector("#fullscreen-button");
      const mobileBrowser = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const pixelRatioCap = mobileBrowser ? 1.5 : 2;

      function showBanner(message, type) {
        const warning = document.querySelector("#unity-warning");
        warning.textContent = message;
        warning.dataset.type = type || "warning";
        warning.hidden = false;
        if (type !== "error") setTimeout(() => warning.hidden = true, 5000);
      }

      createUnityInstance(canvas, {
        arguments: [],
        dataUrl: "Build/439c5cb6034bdf941567a61e52ba60e7.data.unityweb",
        frameworkUrl: "Build/0ae91e496e84b50aa96f07b66cd76f28.framework.js.unityweb",
        codeUrl: "Build/51279ca79b0bd7d36f0cc0c14a78f293.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "taichi-ffar",
        productName: "AlterAct",
        productVersion: "0.1.0",
        devicePixelRatio: Math.min(window.devicePixelRatio || 1, pixelRatioCap),
        showBanner
      }, value => progress.style.width = `${Math.round(value * 100)}%`)
        .then(unityInstance => {
          loading.hidden = true;
          fullscreenButton.addEventListener("click", async () => {
            try {
              if (document.documentElement.requestFullscreen && !document.fullscreenElement)
                await document.documentElement.requestFullscreen();
            } catch (_) {}
            try { unityInstance.SetFullscreen(1); } catch (_) {}
          });
        })
        .catch(message => showBanner(message, "error"));
    </script>
  </body>
</html>
